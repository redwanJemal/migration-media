<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  @font-face {
    font-family: 'NotoEthiopic';
    src: url('./fonts/NotoSansEthiopic-Variable.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    font-family: 'Inter', 'NotoEthiopic', sans-serif;
    overflow: hidden;
  }

  /* Amharic variant uses NotoEthiopic as primary font */
  body.lang-am {
    font-family: 'NotoEthiopic', 'Inter', sans-serif;
  }

  .thumbnail {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px;
  }

  /* === THEME: scholarship === */
  .theme-scholarship {
    background: linear-gradient(135deg, #0a1628 0%, #1a365d 50%, #2563eb 100%);
    color: white;
  }
  .theme-scholarship .accent { color: #60a5fa; }
  .theme-scholarship .badge { background: #2563eb; }

  /* === THEME: visa === */
  .theme-visa {
    background: linear-gradient(135deg, #0c1220 0%, #1e3a5f 50%, #0ea5e9 100%);
    color: white;
  }
  .theme-visa .accent { color: #38bdf8; }
  .theme-visa .badge { background: #0ea5e9; }

  /* === THEME: migration === */
  .theme-migration {
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #059669 100%);
    color: white;
  }
  .theme-migration .accent { color: #34d399; }
  .theme-migration .badge { background: #059669; }

  /* === THEME: opportunity === */
  .theme-opportunity {
    background: linear-gradient(135deg, #1a0a2e 0%, #4c1d95 50%, #8b5cf6 100%);
    color: white;
  }
  .theme-opportunity .accent { color: #c4b5fd; }
  .theme-opportunity .badge { background: #7c3aed; }

  /* === THEME: remittance === */
  .theme-remittance {
    background: linear-gradient(135deg, #1c1917 0%, #78350f 50%, #f59e0b 100%);
    color: white;
  }
  .theme-remittance .accent { color: #fbbf24; }
  .theme-remittance .badge { background: #d97706; }

  /* === THEME: alert (red/urgent) === */
  .theme-alert {
    background: linear-gradient(135deg, #1a0a0a 0%, #7f1d1d 50%, #dc2626 100%);
    color: white;
  }
  .theme-alert .accent { color: #fca5a5; }
  .theme-alert .badge { background: #dc2626; }

  .top-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .badge {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .lang-am .badge {
    text-transform: none;
    letter-spacing: 0;
    font-size: 24px;
  }

  .flag {
    font-size: 80px;
    line-height: 1;
  }

  .middle-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
  }

  .headline {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: -1px;
  }

  .lang-am .headline {
    font-size: 56px;
    text-transform: none;
    letter-spacing: 0;
    line-height: 1.25;
    font-weight: 700;
  }

  .subheadline {
    font-size: 32px;
    font-weight: 600;
    opacity: 0.9;
    line-height: 1.3;
  }

  .lang-am .subheadline {
    font-size: 28px;
    line-height: 1.5;
  }

  .highlight-box {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    padding: 20px 32px;
    margin-top: 8px;
  }

  .highlight-box .value {
    font-size: 48px;
    font-weight: 900;
    font-family: 'Inter', 'NotoEthiopic', sans-serif;
  }

  .highlight-box .label {
    font-size: 20px;
    opacity: 0.8;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .lang-am .highlight-box .label {
    text-transform: none;
    letter-spacing: 0;
    font-size: 22px;
  }

  .bottom-section {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .brand {
    font-size: 28px;
    font-weight: 700;
    opacity: 0.6;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }

  .deadline {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 700;
  }

  .deadline-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ef4444;
  }

  .decorative-circle {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .circle-1 { width: 400px; height: 400px; top: -100px; right: -100px; }
  .circle-2 { width: 250px; height: 250px; bottom: -50px; left: -50px; }
  .circle-3 { width: 150px; height: 150px; top: 50%; right: 10%; }
</style>
</head>
<body class="{{LANG_CLASS}}">
<div class="thumbnail {{THEME}}">
  <div class="decorative-circle circle-1"></div>
  <div class="decorative-circle circle-2"></div>
  <div class="decorative-circle circle-3"></div>

  <div class="top-section">
    <span class="badge">{{BADGE}}</span>
    <span class="flag">{{FLAG}}</span>
  </div>

  <div class="middle-section">
    <div class="headline">{{HEADLINE}}</div>
    <div class="subheadline">{{SUBHEADLINE}}</div>
    <div class="highlight-box" style="{{HIGHLIGHT_STYLE}}">
      <div class="value accent">{{HIGHLIGHT_VALUE}}</div>
      <div class="label">{{HIGHLIGHT_LABEL}}</div>
    </div>
  </div>

  <div class="bottom-section">
    <span class="brand">MigrationPath</span>
    <span class="deadline" style="{{DEADLINE_STYLE}}">
      <span class="deadline-dot"></span>
      {{DEADLINE}}
    </span>
  </div>
</div>
</body>
</html>
